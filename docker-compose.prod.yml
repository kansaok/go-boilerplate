version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-boilerplate-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=database
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DB_CONNECTION=postgres
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./storage/sqlite:/app/storage/sqlite
      - ./uploads:/app/uploads
    networks:
      - app-network
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    container_name: go-boilerplate-db
    env_file:
      - .env.database
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
